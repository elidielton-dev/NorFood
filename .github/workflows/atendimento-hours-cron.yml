name: Atendimento hours cron

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync-store-hours:
    runs-on: ubuntu-latest
    steps:
      - name: Call atendimento-hours endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: https://abelhaemel.vercel.app
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is not configured in GitHub."
            exit 1
          fi
          response="$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/atendimento-hours")"
          body="$(echo "$response" | head -n -1)"
          code="$(echo "$response" | tail -n 1)"
          echo "$body"
          if [ "$code" != "200" ]; then
            echo "Request failed with HTTP ${code}"
            exit 1
          fi
