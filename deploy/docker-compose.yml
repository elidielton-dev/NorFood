services:
  norfood:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID}
        VITE_DEMO_MODE: ${VITE_DEMO_MODE:-false}
        VITE_PLATFORM_ADMIN_EMAILS: ${VITE_PLATFORM_ADMIN_EMAILS}
        VITE_MP_PUBLIC_KEY: ${VITE_MP_PUBLIC_KEY:-}
        VITE_EXPO_GO_URL: ${EXPO_GO_URL:-exp://15.228.214.190:8081}
        VITE_EXPO_METRO_HOST: ${EXPO_METRO_HOST:-15.228.214.190}
        VITE_EXPO_METRO_PORT: ${EXPO_METRO_PORT:-8081}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      EXPO_GO_URL: ${EXPO_GO_URL:-exp://15.228.214.190:8081}
      EXPO_METRO_HOST: ${EXPO_METRO_HOST:-15.228.214.190}
      EXPO_METRO_PORT: ${EXPO_METRO_PORT:-8081}
      EXPO_URL_FILE: /data/expo-go-url.txt
      WHATSAPP_GATEWAY_URL: http://whatsapp-gateway:8090
      WHATSAPP_GATEWAY_KEY: ${WHATSAPP_GATEWAY_KEY}
      WHATSAPP_INSTANCE_NAME: ${WHATSAPP_INSTANCE_NAME:-norfood}
      WHATSAPP_WEBHOOK_URL: ${WHATSAPP_WEBHOOK_URL}
    volumes:
      - expo-go-data:/data:ro
    expose:
      - "3000"
    networks:
      - norfood-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

    depends_on:
      whatsapp-gateway:
        condition: service_healthy

  whatsapp-gateway:
    build:
      context: ../services/whatsapp-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WHATSAPP_AUTH_DIR: /data/auth
      WHATSAPP_GATEWAY_PORT: 8090
      WHATSAPP_WEBHOOK_URL: ${WHATSAPP_WEBHOOK_URL}
      WHATSAPP_GATEWAY_KEY: ${WHATSAPP_GATEWAY_KEY}
      WHATSAPP_INSTANCE_NAME: ${WHATSAPP_INSTANCE_NAME:-norfood}
    volumes:
      - whatsapp-auth:/data/auth
    expose:
      - "8090"
    networks:
      - norfood-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  expo-metro:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.expo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      EXPO_PUBLIC_SUPABASE_URL: ${VITE_SUPABASE_URL}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
      DOMAIN: ${DOMAIN}
      EXPO_METRO_HOST: ${EXPO_METRO_HOST:-15.228.214.190}
      EXPO_URL_FILE: /data/expo-go-url.txt
    volumes:
      - expo-go-data:/data
    ports:
      - "8081:8081"
    networks:
      - norfood-net
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile.template:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - norfood-net
    depends_on:
      norfood:
        condition: service_healthy
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile

networks:
  norfood-net:

volumes:
  caddy_data:
  caddy_config:
  expo-go-data:
  whatsapp-auth:
