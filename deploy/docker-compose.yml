services:
  norfood:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID}
        VITE_DEMO_MODE: ${VITE_DEMO_MODE:-false}
        VITE_PLATFORM_ADMIN_EMAILS: ${VITE_PLATFORM_ADMIN_EMAILS}
        VITE_MP_PUBLIC_KEY: ${VITE_MP_PUBLIC_KEY:-}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    expose:
      - "3000"
    networks:
      - norfood-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile.template:/etc/caddy/Caddyfile.template:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - norfood-net
    depends_on:
      norfood:
        condition: service_healthy
    command: sh -c "apk add --no-cache gettext >/dev/null 2>&1 && envsubst '$$DOMAIN $$ACME_EMAIL' < /etc/caddy/Caddyfile.template > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"

networks:
  norfood-net:

volumes:
  caddy_data:
  caddy_config:
